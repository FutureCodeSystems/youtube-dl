            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }
        .video-container {
            padding: 20px;
            background: #000;
        }
        .video-js {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
        }
        .info {
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #dee2e6;
        }
        .info h3 {
            color: #495057;
            margin-bottom: 10px;
        }
        .info p {
            color: #6c757d;
            line-height: 1.6;
        }
        .footer {
            background: #343a40;
            color: #adb5bd;
            padding: 15px 30px;
            text-align: center;
            font-size: 0.85em;
        }
        .footer a {
            color: #80bdff;
            text-decoration: none;
        }
        .download-btn {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .download-btn:hover {
            background: #218838;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.3em; }
            .info { padding: 15px 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎬 AVASAM HLS Video Player</h1>
        <p>High Quality Streaming | Direct Download Available</p>
    </div>
    <div class="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="100%" height="auto" data-setup='{}'>
            <source src="stream.m3u8" type="application/x-mpegURL">
            <p class="vjs-no-js">To view this video please enable JavaScript.</p>
        </video>
    </div>
    <div class="info">
        <h3>📹 Video Information</h3>
        <p><strong>Format:</strong> HLS Streaming (HTTP Live Streaming)</p>
        <p><strong>Quality:</strong> Adaptive Bitrate (1080p)</p>
        <p><strong>How to watch:</strong> Video streams directly in your browser. You can also download segments manually.</p>
        <a href="#" id="directLink" class="download-btn">💾 Download Original Video</a>
    </div>
    <div class="footer">
        <p>Powered by <a href="https://avasam.ir" target="_blank">AVASAM</a> | Hosted on GitHub</p>
    </div>
</div>
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    var player = videojs('my-video', {
        controlBar: {
            pictureInPictureToggle: true,
            currentTimeDisplay: true,
            timeDivider: true,
            durationDisplay: true,
            progressControl: true
        }
    });
    
    // Try to get original video (if exists)
    fetch('original_video.txt').then(r => r.text()).then(url => {
        if(url && url !== '') {
            document.getElementById('directLink').href = url;
        }
    }).catch(() => {});
</script>
</body>
</html>
EOF
            
            # Create info file
            REPO_OWNER="${{ github.repository_owner }}"
            REPO_NAME="${{ github.event.repository.name }}"
            BRANCH="${GITHUB_REF_NAME}"
            PLAYER_URL="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/player.html"
            
            cat > INFO.txt << EOF
╔══════════════════════════════════════════════════════════════════╗
║                    🎬 AVASAM YouTube Downloader                   ║
║                       https://avasam.ir                           ║
╚══════════════════════════════════════════════════════════════════╝

📹 VIDEO INFORMATION
