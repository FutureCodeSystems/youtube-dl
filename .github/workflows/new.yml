name: 01- 🎬 Youtube Downloader (Ultra Fast & Robust)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      use_cookies:
        description: 'Use cookies from secrets.YOUTUBE_COOKIES? (true/false)'
        required: false
        default: 'false'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup WARP (with fallback)
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          echo "⏳ Waiting for WARP..."
          WARP_READY=false
          for i in {1..12}; do
            sleep 5
            if docker ps | grep -q warp && curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP ready"
              WARP_READY=true
              break
            fi
          done
          if [ "$WARP_READY" = false ]; then
            echo "⚠️ WARP failed, will continue without proxy"
            echo "WARP_FAILED=true" >> $GITHUB_ENV
          else
            echo "WARP_FAILED=false" >> $GITHUB_ENV
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg curl
          pip3 install --upgrade yt-dlp

      - name: Prepare cookies (if enabled)
        if: github.event.inputs.use_cookies == 'true' && secrets.YOUTUBE_COOKIES != ''
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          echo "COOKIES_OPT=--cookies cookies.txt" >> $GITHUB_ENV
        continue-on-error: true

      - name: Ultra Fast Download & HLS Convert
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          mkdir -p videos

          # Proxy option
          if [ "$WARP_FAILED" = "true" ]; then
            PROXY_OPT=""
          else
            PROXY_OPT="--proxy socks5://127.0.0.1:1080"
          fi

          # Cookies option (if available)
          COOKIES_OPT="${COOKIES_OPT:-}"

          # Get video info
          VIDEO_ID=$(yt-dlp $PROXY_OPT $COOKIES_OPT --get-id --no-playlist "$URL" 2>/dev/null)
          VIDEO_TITLE=$(yt-dlp $PROXY_OPT $COOKIES_OPT --get-title --no-playlist "$URL" 2>/dev/null | sed 's/[^a-zA-Z0-9\-_ ]/ /g' | cut -c1-100)
          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Failed to get video ID (maybe private video? try with cookies)"
            exit 1
          fi

          VIDEO_DIR="videos/${VIDEO_ID}"
          SEGMENTS_DIR="${VIDEO_DIR}/segments"
          mkdir -p "$SEGMENTS_DIR"

          # Save metadata
          {
            echo "Video ID: $VIDEO_ID"
            echo "Original Title: ${VIDEO_TITLE:-Unknown}"
            echo "YouTube URL: $URL"
            echo "Download Date: $(date)"
            echo "Quality Requested: $QUALITY"
          } > "${VIDEO_DIR}/video_info.txt"

          # Quality list
          case "$QUALITY" in
            best)   QUALITIES=("1080" "720" "480") ;;
            1080)   QUALITIES=("1080") ;;
            720)    QUALITIES=("720") ;;
            480)    QUALITIES=("480") ;;
            audio)  QUALITIES=("audio") ;;
            *)      QUALITIES=("1080" "720" "480") ;;
          esac

          # Function to process one quality
          process_quality() {
            local Q="$1"
            if [ "$Q" == "audio" ]; then
              echo "🎵 Downloading audio..."
              yt-dlp $PROXY_OPT $COOKIES_OPT \
                --format "bestaudio" \
                --extract-audio --audio-format m4a \
                --output "${SEGMENTS_DIR}/audio.m4a" \
                --no-playlist --no-mtime \
                "$URL" && {
                  printf '#EXTM3U\n#EXT-X-VERSION:3\n#EXT-X-ALLOW-CACHE:YES\n#EXT-X-TARGETDURATION:10\n#EXT-X-MEDIA-SEQUENCE:0\n#EXTINF:10.0,\nsegments/audio.m4a\n#EXT-X-ENDLIST\n' > "${VIDEO_DIR}/audio.m3u8"
                  echo "✅ Audio done"
                }
              return
            fi

            echo "🎬 Processing ${Q}p"
            local TEMP_MP4="tmp_${Q}.mp4"

            # Download: try direct MP4 first (fastest)
            yt-dlp $PROXY_OPT $COOKIES_OPT \
              --format "best[height<=${Q}][ext=mp4]/best[height<=${Q}]" \
              --output "$TEMP_MP4" \
              --no-playlist --no-mtime --no-post-overwrites \
              --concurrent-fragments 10 --buffer-size 64K \
              --retries 5 --fragment-retries 5 \
              "$URL" 2>&1 | grep -v "Merger\|Deleting" || {
                # Fallback with merge (if direct not available)
                yt-dlp $PROXY_OPT $COOKIES_OPT \
                  --format "bestvideo[height<=${Q}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${Q}][ext=mp4]" \
                  --merge-output-format mp4 \
                  --output "$TEMP_MP4" \
                  --no-playlist --no-mtime \
                  --concurrent-fragments 10 \
                  "$URL"
              }

            if [ ! -f "$TEMP_MP4" ]; then
              echo "⚠️ ${Q}p unavailable"
              return
            fi

            mkdir -p "${SEGMENTS_DIR}/${Q}p"

            # Convert to HLS with proper segment paths
            ffmpeg -i "$TEMP_MP4" \
              -c:v libx264 -preset ultrafast -crf 28 -tune fastdecode \
              -c:a aac -b:a 128k -movflags +faststart \
              -f hls -hls_time 10 -hls_list_size 0 \
              -hls_segment_filename "${SEGMENTS_DIR}/${Q}p/segment_%03d.ts" \
              -hls_flags independent_segments \
              -threads auto \
              "${VIDEO_DIR}/${Q}p.m3u8" -loglevel error

            # *** CRITICAL FIX: rewrite paths in m3u8 to include segments/quality/ ***
            # The ffmpeg generates lines like "segment_000.ts" - we need "segments/720p/segment_000.ts"
            sed -i "s|^segment_|segments/${Q}p/segment_|g" "${VIDEO_DIR}/${Q}p.m3u8"

            rm -f "$TEMP_MP4"
            echo "✅ ${Q}p done"
          }

          # Run qualities in parallel (max 3 at a time)
          for Q in "${QUALITIES[@]}"; do
            process_quality "$Q" &
            sleep 1
            while [ $(jobs -r | wc -l) -ge 3 ]; do sleep 1; done
          done
          wait

          # Build master.m3u8
          MASTER="${VIDEO_DIR}/master.m3u8"
          printf '#EXTM3U\n#EXT-X-VERSION:3\n' > "$MASTER"
          for Q in "${QUALITIES[@]}"; do
            if [ "$Q" != "audio" ] && [ -f "${VIDEO_DIR}/${Q}p.m3u8" ]; then
              BANDWIDTH=$((Q * 1000))
              printf '#EXT-X-STREAM-INF:BANDWIDTH=%d000,RESOLUTION=1920x%s\n' "$BANDWIDTH" "$Q" >> "$MASTER"
              printf '%sp.m3u8\n' "$Q" >> "$MASTER"
            fi
          done
          if [ -f "${VIDEO_DIR}/audio.m3u8" ]; then
            printf '#EXT-X-STREAM-INF:BANDWIDTH=128000,CODECS="mp4a.40.2"\naudio.m3u8\n' >> "$MASTER"
          fi

          # ========== Generate player.html (safe inline) ==========
          PLAYER_FILE="${VIDEO_DIR}/player.html"
          printf '<!DOCTYPE html>\n' > "$PLAYER_FILE"
          printf '<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes"><title>AVASAM HLS Player</title>\n' >> "$PLAYER_FILE"
          printf '<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;font-family:system-ui}.container{display:flex;flex-direction:column;height:100vh}video{flex:1;width:100%;object-fit:contain}.controls{background:#1a1a1a;padding:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;border-top:1px solid #333}button{background:#333;border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer}button.active{background:#007aff}.status{position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.7);color:#0f0;padding:4px 12px;border-radius:16px;font-size:12px;font-family:monospace;pointer-events:none}</style>\n' >> "$PLAYER_FILE"
          printf '</head><body><div class="container"><video id="video" controls playsinline></video><div class="controls" id="quality-buttons"></div></div><div class="status" id="status">Loading...</div>\n' >> "$PLAYER_FILE"
          printf '<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>\n' >> "$PLAYER_FILE"
          printf '<script>\n' >> "$PLAYER_FILE"
          printf 'const BASE_URL = "https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${GITHUB_REF_NAME}/videos/' >> "$PLAYER_FILE"
          printf "${VIDEO_ID}"; printf '";\n' >> "$PLAYER_FILE"
          printf 'const video = document.getElementById("video");\n' >> "$PLAYER_FILE"
          printf 'const qualityDiv = document.getElementById("quality-buttons");\n' >> "$PLAYER_FILE"
          printf 'const statusDiv = document.getElementById("status");\n' >> "$PLAYER_FILE"
          printf 'let hls = null;\n'
          printf 'function log(msg, isError){statusDiv.innerHTML=msg;statusDiv.style.color=isError?"#ff6b6b":"#8bc34a";console.log(msg);}\n'
          printf 'async function fetchQualities(){\n'
          printf 'const masterUrl = BASE_URL + "/master.m3u8";\n'
          printf 'log("Fetching "+masterUrl);\n'
          printf 'const res = await fetch(masterUrl);\n'
          printf 'if(!res.ok) throw new Error("master.m3u8 HTTP "+res.status);\n'
          printf 'const text = await res.text();\n'
          printf 'const lines = text.split("\\n");\n'
          printf 'const qualities = [];\n'
          printf 'for(let i=0;i<lines.length;i++){\n'
          printf 'const line = lines[i].trim();\n'
          printf 'if(line.includes("#EXT-X-STREAM-INF") && line.includes("RESOLUTION=")){\n'
          printf 'const match = line.match(/RESOLUTION=\\d+x(\\d+)/);\n'
          printf 'if(match && i+1 < lines.length){\n'
          printf 'const resolution = match[1];\n'
          printf 'let playlist = lines[i+1].trim();\n'
          printf 'if(!playlist.startsWith("http")) playlist = BASE_URL + "/" + playlist;\n'
          printf 'qualities.push({ label: resolution+"p", url: playlist, quality: resolution });\n'
          printf '}}}\n'
          printf 'if(qualities.length===0) throw new Error("No quality found");\n'
          printf 'qualities.sort((a,b)=>parseInt(b.label)-parseInt(a.label));\n'
          printf 'return qualities;\n'
          printf '}\n'
          printf 'async function fixM3u8Segments(playlistUrl, quality){\n'
          printf 'const res = await fetch(playlistUrl);\n'
          printf 'if(!res.ok) throw new Error("playlist HTTP "+res.status);\n'
          printf 'let content = await res.text();\n'
          printf 'const lines = content.split("\\n");\n'
          printf 'const newLines = [];\n'
          printf 'for(let line of lines){\n'
          printf 'line = line.trim();\n'
          printf 'if(line && !line.startsWith("#") && line.endsWith(".ts")){\n'
          printf 'const corrected = `${BASE_URL}/segments/${quality}p/${line}`;\n'
          printf 'newLines.push(corrected);\n'
          printf '} else { newLines.push(line); }\n'
          printf '}\n'
          printf 'return newLines.join("\\n");\n'
          printf '}\n'
          printf 'async function playQuality(qualityUrl, label, qualityNum){\n'
          printf 'const currentTime = video.currentTime;\n'
          printf 'const wasPlaying = !video.paused;\n'
          printf 'log("Loading "+label+"...");\n'
          printf 'let fixed;\n'
          printf 'try { fixed = await fixM3u8Segments(qualityUrl, qualityNum); }\n'
          printf 'catch(e){ log(e.message,true); return; }\n'
          printf 'const blob = new Blob([fixed], {type:"application/vnd.apple.mpegurl"});\n'
          printf 'const blobUrl = URL.createObjectURL(blob);\n'
          printf 'if(hls){ hls.destroy(); hls=null; }\n'
          printf 'if(Hls.isSupported()){\n'
          printf 'hls = new Hls({ capLevelToPlayerSize: true });\n'
          printf 'hls.loadSource(blobUrl);\n'
          printf 'hls.attachMedia(video);\n'
          printf 'hls.on(Hls.Events.MANIFEST_PARSED, ()=>{\n'
          printf 'video.currentTime = currentTime;\n'
          printf 'if(wasPlaying) video.play();\n'
          printf 'log("Playing "+label);\n'
          printf '});\n'
          printf 'hls.on(Hls.Events.ERROR, (_,data)=>log("HLS error: "+data.type, true));\n'
          printf '} else if(video.canPlayType("application/vnd.apple.mpegurl")){\n'
          printf 'video.src = blobUrl;\n'
          printf 'video.addEventListener("loadedmetadata",()=>{ video.currentTime=currentTime; if(wasPlaying) video.play(); });\n'
          printf 'log("Playing "+label+" (native)");\n'
          printf '} else { log("HLS not supported", true); }\n'
          printf '}\n'
          printf 'async function init(){\n'
          printf 'try{\n'
          printf 'const qualities = await fetchQualities();\n'
          printf 'qualityDiv.innerHTML = "";\n'
          printf 'qualities.forEach((q,idx)=>{\n'
          printf 'const btn = document.createElement("button");\n'
          printf 'btn.textContent = q.label;\n'
          printf 'btn.onclick = ()=>{\n'
          printf 'document.querySelectorAll("#quality-buttons button").forEach(b=>b.classList.remove("active"));\n'
          printf 'btn.classList.add("active");\n'
          printf 'playQuality(q.url, q.label, q.quality);\n'
          printf '};\n'
          printf 'qualityDiv.appendChild(btn);\n'
          printf 'if(idx===0) btn.click();\n'
          printf '});\n'
          printf '} catch(err){ log("Init error: "+err.message, true); qualityDiv.innerHTML=`<div style="color:#ff6b6b">Error: ${err.message}</div>`; }\n'
          printf '}\n'
          printf 'init();\n'
          printf '</script></body></html>\n' >> "$PLAYER_FILE"

          echo "✅ Done. Output: $VIDEO_DIR"

      - name: Stop WARP
        if: always()
        run: docker stop warp || true

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Ultra fast HLS video [skip ci]" || true
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push origin HEAD:"${{ github.ref_name }}"
