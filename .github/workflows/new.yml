name: 01- 🚀 Youtube Downloader (No-Stall)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string

jobs:
  ultra-fast:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup WARP
        run: |
          docker network create warp-net || true
          docker run -d --name warp --network warp-net -p 1080:1080 \
            --cap-add NET_ADMIN --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp caomingjun/warp
          sleep 25
          echo "WARP ready"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg aria2
          pip install --upgrade yt-dlp

      - name: 🚀 Download & Convert to HLS
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          mkdir -p videos
          echo "=== AVASAM Ultra Fast Mode ==="
          echo "URL: $URL"
          
          VIDEO_ID=$(yt-dlp --proxy socks5://127.0.0.1:1080 --get-id "$URL")
          VIDEO_TITLE=$(yt-dlp --proxy socks5://127.0.0.1:1080 --get-title "$URL" | tr ' ' '_' | cut -c1-50)
          [ -z "$VIDEO_ID" ] && exit 1
          
          VIDEO_DIR="videos/$VIDEO_ID"
          SEGMENTS_DIR="$VIDEO_DIR/segments"
          mkdir -p "$SEGMENTS_DIR"
          
          echo "Video ID: $VIDEO_ID"
          echo "Title: $VIDEO_TITLE"
          
          cat > "$VIDEO_DIR/video_info.txt" <<-EOF
          Video ID: $VIDEO_ID
          Title: $VIDEO_TITLE
          URL: $URL
          Date: $(date)
          EOF
          
          case "$QUALITY" in
            best)   RESOLUTIONS=("1080" "720" "480") ;;
            1080)   RESOLUTIONS=("1080") ;;
            720)    RESOLUTIONS=("720") ;;
            480)    RESOLUTIONS=("480") ;;
            audio)  RESOLUTIONS=("audio") ;;
            *)      RESOLUTIONS=("720") ;;
          esac
          
          # تابع دانلود و تبدیل
          process_quality() {
            local res="$1"
            if [ "$res" = "audio" ]; then
              echo "🎵 Downloading audio ..."
              yt-dlp --proxy socks5://127.0.0.1:1080 -f bestaudio --extract-audio --audio-format m4a \
                -o "$SEGMENTS_DIR/audio.m4a" --no-playlist --no-mtime --concurrent-fragments 10 "$URL" >/dev/null 2>&1
              printf '#EXTM3U\n#EXT-X-VERSION:3\n#EXTINF:10.0,\nsegments/audio.m4a\n#EXT-X-ENDLIST\n' > "$VIDEO_DIR/audio.m3u8"
              echo "✅ Audio done"
              return
            fi
            
            echo "🎬 ${res}p downloading ..."
            yt-dlp --proxy socks5://127.0.0.1:1080 \
              --format "best[height<=${res}][ext=mp4]/best[height<=${res}]" \
              -o "tmp_${res}.mp4" --no-playlist --no-mtime --concurrent-fragments 16 \
              --downloader aria2c --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
              "$URL" >/dev/null 2>&1
            
            if [ ! -f "tmp_${res}.mp4" ]; then
              echo "⚠️ ${res}p fallback to merge ..."
              yt-dlp --proxy socks5://127.0.0.1:1080 \
                --format "bestvideo[height<=${res}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${res}][ext=mp4]" \
                --merge-output-format mp4 -o "tmp_${res}.mp4" --no-playlist --no-mtime "$URL" >/dev/null 2>&1
            fi
            
            if [ -f "tmp_${res}.mp4" ]; then
              mkdir -p "$SEGMENTS_DIR/${res}p"
              ffmpeg -i "tmp_${res}.mp4" \
                -c:v libx264 -preset ultrafast -crf 28 \
                -c:a aac -b:a 96k \
                -f hls -hls_time 6 -hls_list_size 0 \
                -hls_segment_filename "$SEGMENTS_DIR/${res}p/seg_%03d.ts" \
                -hls_flags independent_segments \
                "$VIDEO_DIR/${res}p.m3u8" 2>/dev/null
              
              sed -i "s|${res}p/seg_|segments/${res}p/seg_|g" "$VIDEO_DIR/${res}p.m3u8"
              rm -f "tmp_${res}.mp4"
              echo "✅ ${res}p done"
            else
              echo "❌ ${res}p failed"
            fi
          }
          
          # اجرای موازی
          for r in "${RESOLUTIONS[@]}"; do
            process_quality "$r" &
          done
          wait
          
          # ساخت master.m3u8
          MASTER="$VIDEO_DIR/master.m3u8"
          echo "#EXTM3U" > "$MASTER"
          echo "#EXT-X-VERSION:3" >> "$MASTER"
          for r in "${RESOLUTIONS[@]}"; do
            if [ "$r" != "audio" ] && [ -f "$VIDEO_DIR/${r}p.m3u8" ]; then
              echo "#EXT-X-STREAM-INF:BANDWIDTH=$((r*1000))000,RESOLUTION=1920x${r}" >> "$MASTER"
              echo "${r}p.m3u8" >> "$MASTER"
            fi
          done
          [ -f "$VIDEO_DIR/audio.m3u8" ] && echo "#EXT-X-STREAM-INF:BANDWIDTH=128000,CODECS=\"mp4a.40.2\"" >> "$MASTER" && echo "audio.m3u8" >> "$MASTER"
          
          # ساخت player.html با printf (بدون خطای YAML)
          PLAYER_FILE="$VIDEO_DIR/player.html"
          printf '%s\n' '<!DOCTYPE html>' > "$PLAYER_FILE"
          printf '%s\n' '<html><head><meta charset="UTF-8"><title>🎬 AVASAM Player</title>' >> "$PLAYER_FILE"
          printf '%s\n' '<link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">' >> "$PLAYER_FILE"
          printf '%s\n' '<style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}.video-js{width:100%;height:auto;aspect-ratio:16/9}</style>' >> "$PLAYER_FILE"
          printf '%s\n' '</head><body>' >> "$PLAYER_FILE"
          printf '%s\n' '<video id="player" class="video-js vjs-big-play-centered" controls></video>' >> "$PLAYER_FILE"
          printf '%s\n' '<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>' >> "$PLAYER_FILE"
          printf '%s\n' '<script>' >> "$PLAYER_FILE"
          printf '%s\n' 'const videoId = window.location.pathname.match(/\/videos\/([^\/]+)/)[1];' >> "$PLAYER_FILE"
          printf '%s\n' 'const base = "RAW_BASE_PLACEHOLDER/videos/" + videoId;' >> "$PLAYER_FILE"
          printf '%s\n' 'fetch(base+"/master.m3u8").then(r=>r.text()).then(data=>{' >> "$PLAYER_FILE"
          printf '%s\n' '  const qualities={};' >> "$PLAYER_FILE"
          printf '%s\n' '  const lines=data.split("\n");' >> "$PLAYER_FILE"
          printf '%s\n' '  for(let i=0;i<lines.length;i++){' >> "$PLAYER_FILE"
          printf '%s\n' '    if(lines[i].includes("RESOLUTION")){' >> "$PLAYER_FILE"
          printf '%s\n' '      const match=lines[i].match(/RESOLUTION=\d+x(\d+)/);' >> "$PLAYER_FILE"
          printf '%s\n' '      if(match){' >> "$PLAYER_FILE"
          printf '%s\n' '        const url=lines[i+1].trim();' >> "$PLAYER_FILE"
          printf '%s\n' '        qualities[match[1]]=url.startsWith("http")?url:base+"/"+url;' >> "$PLAYER_FILE"
          printf '%s\n' '      }' >> "$PLAYER_FILE"
          printf '%s\n' '    }' >> "$PLAYER_FILE"
          printf '%s\n' '  }' >> "$PLAYER_FILE"
          printf '%s\n' '  const best=Object.keys(qualities).sort((a,b)=>b-a)[0];' >> "$PLAYER_FILE"
          printf '%s\n' '  videojs("player",{src:qualities[best],type:"application/x-mpegURL",html5:{hls:{enableLowInitialPlaylist:true}}});' >> "$PLAYER_FILE"
          printf '%s\n' '});' >> "$PLAYER_FILE"
          printf '%s\n' '</script>' >> "$PLAYER_FILE"
          printf '%s\n' '</body></html>' >> "$PLAYER_FILE"
          
          RAW_BASE="https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${GITHUB_REF_NAME}"
          sed -i "s|RAW_BASE_PLACEHOLDER|$RAW_BASE|g" "$PLAYER_FILE"
          
          echo "============================================"
          echo "✅ Completed in $(($SECONDS/60))m $(($SECONDS%60))s"
          echo "Video ID: $VIDEO_ID"
          echo "Player URL: $RAW_BASE/$VIDEO_DIR/player.html"
          echo "============================================"

      - name: Stop WARP
        if: always()
        run: docker stop warp || true; docker rm warp || true

      - name: Push to Repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "🚀 Ultra fast video [skip ci]" || true
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin HEAD:"${{ github.ref_name }}"
