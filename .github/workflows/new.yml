name: 01- 🎬 Youtube Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start WARP Container
        run: |
          echo "🚀 Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "⏳ Waiting for WARP to initialize (30 seconds)..."
          sleep 30
          echo "🔍 Checking WARP status..."
          for i in {1..10}; do
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              echo "$RESULT"
              break
            else
              echo "⏳ Attempt $i/10 - WARP not ready yet, waiting..."
              sleep 10
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "✅ WARP proxy is ready!"
          else
            echo "⚠️ WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip curl jq bc
          pip3 install --upgrade yt-dlp

      - name: Download & Convert to HLS
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          
          mkdir -p videos
          
          echo "🏷️  AVASAM HLS YouTube Downloader"
          echo "🌐 https://avasam.ir"
          echo ""
          echo "📹 Downloading: $URL"
          
          VIDEO_ID=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --get-id --no-playlist "$URL" 2>/dev/null)
          VIDEO_TITLE=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --get-title --no-playlist "$URL" 2>/dev/null | sed 's/[^a-zA-Z0-9\-_ ]/ /g' | cut -c1-100)
          
          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Failed to get video ID"
            exit 1
          fi
          
          VIDEO_DIR_NAME="$VIDEO_ID"
          VIDEO_DIR="videos/${VIDEO_DIR_NAME}"
          SEGMENTS_DIR="${VIDEO_DIR}/segments"
          mkdir -p "$SEGMENTS_DIR"
          
          echo "📁 Video ID: $VIDEO_ID"
          echo "📁 Video Title: ${VIDEO_TITLE:-Unknown}"
          echo "📁 Folder name: $VIDEO_DIR_NAME"
          echo "🎯 Quality: $QUALITY"
          
          printf '%s\n' "Video ID: $VIDEO_ID" > "${VIDEO_DIR}/video_info.txt"
          printf '%s\n' "Original Title: ${VIDEO_TITLE:-Unknown}" >> "${VIDEO_DIR}/video_info.txt"
          printf '%s\n' "YouTube URL: $URL" >> "${VIDEO_DIR}/video_info.txt"
          printf '%s\n' "Download Date: $(date)" >> "${VIDEO_DIR}/video_info.txt"
          printf '%s\n' "Quality Requested: $QUALITY" >> "${VIDEO_DIR}/video_info.txt"
          
          declare -a QUALITIES=()
          case "$QUALITY" in
            "best")
              QUALITIES=("1080" "720" "480")
              ;;
            "1080")
              QUALITIES=("1080")
              ;;
            "720")
              QUALITIES=("720")
              ;;
            "480")
              QUALITIES=("480")
              ;;
            "audio")
              QUALITIES=("audio")
              ;;
          esac
          
          for Q in "${QUALITIES[@]}"; do
            if [ "$Q" == "audio" ]; then
              echo "🎵 Downloading audio only..."
              yt-dlp \
                --proxy "socks5://127.0.0.1:1080" \
                --format "bestaudio" \
                --extract-audio \
                --audio-format m4a \
                --output "${SEGMENTS_DIR}/audio.m4a" \
                --no-playlist \
                "$URL" || continue
              
              printf '#EXTM3U\n' > "${VIDEO_DIR}/audio.m3u8"
              printf '#EXT-X-VERSION:3\n' >> "${VIDEO_DIR}/audio.m3u8"
              printf '#EXT-X-ALLOW-CACHE:YES\n' >> "${VIDEO_DIR}/audio.m3u8"
              printf '#EXT-X-TARGETDURATION:10\n' >> "${VIDEO_DIR}/audio.m3u8"
              printf '#EXT-X-MEDIA-SEQUENCE:0\n' >> "${VIDEO_DIR}/audio.m3u8"
              printf '#EXTINF:10.0,\n' >> "${VIDEO_DIR}/audio.m3u8"
              printf 'segments/audio.m4a\n' >> "${VIDEO_DIR}/audio.m3u8"
              printf '#EXT-X-ENDLIST\n' >> "${VIDEO_DIR}/audio.m3u8"
              
              echo "✅ Audio downloaded"
              continue
            fi
            
            echo "🎬 Processing quality: ${Q}p"
            TEMP_VIDEO="tmp_${Q}.mp4"
            
            yt-dlp \
              --proxy "socks5://127.0.0.1:1080" \
              --format "bestvideo[height<=${Q}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${Q}][ext=mp4]/best" \
              --merge-output-format mp4 \
              --output "$TEMP_VIDEO" \
              --no-playlist \
              "$URL" || continue
            
            if [ ! -f "$TEMP_VIDEO" ]; then
              echo "⚠️ Quality ${Q}p not available, skipping..."
              continue
            fi
            
            mkdir -p "${SEGMENTS_DIR}/${Q}p"
            
            ffmpeg -i "$TEMP_VIDEO" \
              -c:v libx264 -crf 23 -preset medium \
              -c:a aac -b:a 128k \
              -f hls \
              -hls_time 10 \
              -hls_list_size 0 \
              -hls_segment_filename "${SEGMENTS_DIR}/${Q}p/segment_%03d.ts" \
              -hls_flags independent_segments \
              "${VIDEO_DIR}/${Q}p.m3u8" 2>/dev/null
            
            sed -i "s|${Q}p/segment_|segments/${Q}p/segment_|g" "${VIDEO_DIR}/${Q}p.m3u8"
            rm -f "$TEMP_VIDEO"
            
            TOTAL_SIZE=$(du -sh "${SEGMENTS_DIR}/${Q}p" 2>/dev/null | cut -f1)
            echo "✅ ${Q}p: Converted to $(ls ${SEGMENTS_DIR}/${Q}p/*.ts 2>/dev/null | wc -l) segments (~${TOTAL_SIZE})"
          done
          
          MASTER_PLAYLIST="${VIDEO_DIR}/master.m3u8"
          printf '#EXTM3U\n' > "$MASTER_PLAYLIST"
          printf '#EXT-X-VERSION:3\n' >> "$MASTER_PLAYLIST"
          
          for Q in "${QUALITIES[@]}"; do
            if [ "$Q" != "audio" ] && [ -f "${VIDEO_DIR}/${Q}p.m3u8" ]; then
              BANDWIDTH=$((Q * 1000))
              printf '#EXT-X-STREAM-INF:BANDWIDTH=%d000,RESOLUTION=1920x%s\n' "$BANDWIDTH" "$Q" >> "$MASTER_PLAYLIST"
              printf '%sp.m3u8\n' "$Q" >> "$MASTER_PLAYLIST"
            fi
          done
          
          if [ -f "${VIDEO_DIR}/audio.m3u8" ]; then
            printf '#EXT-X-STREAM-INF:BANDWIDTH=128000,CODECS="mp4a.40.2"\n' >> "$MASTER_PLAYLIST"
            printf 'audio.m3u8\n' >> "$MASTER_PLAYLIST"
          fi
          
          PLAYER_HTML="${VIDEO_DIR}/player.html"
          printf '%s\n' '<!DOCTYPE html>' > "$PLAYER_HTML"
          printf '%s\n' '<html>' >> "$PLAYER_HTML"
          printf '%s\n' '<head>' >> "$PLAYER_HTML"
          printf '%s\n' '<meta charset="UTF-8">' >> "$PLAYER_HTML"
          printf '%s\n' '<meta name="viewport" content="width=device-width,initial-scale=1.0">' >> "$PLAYER_HTML"
          printf '%s\n' '<title>🎬 AVASAM HLS Player</title>' >> "$PLAYER_HTML"
          printf '%s\n' '<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">' >> "$PLAYER_HTML"
          printf '%s\n' '<style>' >> "$PLAYER_HTML"
          printf '%s\n' 'body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:0;padding:20px;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}' >> "$PLAYER_HTML"
          printf '%s\n' '.container{max-width:1200px;width:100%;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;padding:20px}' >> "$PLAYER_HTML"
          printf '%s\n' '.header{text-align:center;padding:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;margin:-20px -20px 20px -20px}' >> "$PLAYER_HTML"
          printf '%s\n' '.header h1{margin:0;font-size:1.8em}' >> "$PLAYER_HTML"
          printf '%s\n' '.header p{margin:10px 0 0;opacity:0.9}' >> "$PLAYER_HTML"
          printf '%s\n' '.video-container{border-radius:10px;overflow:hidden;background:#000}' >> "$PLAYER_HTML"
          printf '%s\n' '.quality-selector{margin-top:20px;text-align:center}' >> "$PLAYER_HTML"
          printf '%s\n' '.quality-btn{background:#667eea;color:white;border:none;padding:10px 20px;margin:5px;border-radius:8px;cursor:pointer;transition:all 0.3s;font-size:14px}' >> "$PLAYER_HTML"
          printf '%s\n' '.quality-btn:hover{background:#764ba2;transform:translateY(-2px)}' >> "$PLAYER_HTML"
          printf '%s\n' '.quality-btn.active{background:#4CAF50;box-shadow:0 4px 15px rgba(76,175,80,0.3)}' >> "$PLAYER_HTML"
          printf '%s\n' '.info{margin-top:20px;padding:15px;background:#f5f5f5;border-radius:10px;text-align:center;font-size:14px;color:#666}' >> "$PLAYER_HTML"
          printf '%s\n' '.badge{display:inline-block;background:#4CAF50;color:white;padding:5px 10px;border-radius:20px;font-size:12px;margin:5px}' >> "$PLAYER_HTML"
          printf '%s\n' '</style>' >> "$PLAYER_HTML"
          printf '%s\n' '</head>' >> "$PLAYER_HTML"
          printf '%s\n' '<body>' >> "$PLAYER_HTML"
          printf '%s\n' '<div class="container">' >> "$PLAYER_HTML"
          printf '%s\n' '<div class="header">' >> "$PLAYER_HTML"
          printf '%s\n' '<h1>🎬 AVASAM HLS Player</h1>' >> "$PLAYER_HTML"
          printf '%s\n' '<p>Stream directly from GitHub • No download needed</p>' >> "$PLAYER_HTML"
          printf '%s\n' '</div>' >> "$PLAYER_HTML"
          printf '%s\n' '<div class="video-container">' >> "$PLAYER_HTML"
          printf '%s\n' '<video id="my-video" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto" width="100%" height="auto">' >> "$PLAYER_HTML"
          printf '%s\n' '<p class="vjs-no-js">To view this video please enable JavaScript.</p>' >> "$PLAYER_HTML"
          printf '%s\n' '</video>' >> "$PLAYER_HTML"
          printf '%s\n' '</div>' >> "$PLAYER_HTML"
          printf '%s\n' '<div class="quality-selector" id="quality-selector"></div>' >> "$PLAYER_HTML"
          printf '%s\n' '<div class="info">' >> "$PLAYER_HTML"
          printf '%s\n' '<span class="badge">⚡ HLS Streaming</span>' >> "$PLAYER_HTML"
          printf '%s\n' '<span class="badge">🎥 Adaptive Bitrate</span>' >> "$PLAYER_HTML"
          printf '%s\n' '<span class="badge">📱 Mobile Ready</span>' >> "$PLAYER_HTML"
          printf '%s\n' '<p style="margin-top:10px">🌐 <strong>AVASAM</strong> - YouTube Downloader | <a href="https://avasam.ir" target="_blank">https://avasam.ir</a></p>' >> "$PLAYER_HTML"
          printf '%s\n' '</div>' >> "$PLAYER_HTML"
          printf '%s\n' '</div>' >> "$PLAYER_HTML"
          printf '%s\n' '<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>' >> "$PLAYER_HTML"
          printf '%s\n' '<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>' >> "$PLAYER_HTML"
          printf '%s\n' '<script>' >> "$PLAYER_HTML"
          printf '%s\n' 'var BASE_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf("/") + 1);' >> "$PLAYER_HTML"
          printf '%s\n' 'var MASTER_URL = BASE_PATH + "master.m3u8";' >> "$PLAYER_HTML"
          printf '%s\n' 'var qualities={};' >> "$PLAYER_HTML"
          printf '%s\n' 'fetch(MASTER_URL).then(function(r){return r.text();}).then(function(data){' >> "$PLAYER_HTML"
          printf '%s\n' 'var lines=data.split("\n");' >> "$PLAYER_HTML"
          printf '%s\n' 'for(var i=0;i<lines.length;i++){' >> "$PLAYER_HTML"
          printf '%s\n' 'if(lines[i].includes("RESOLUTION")){' >> "$PLAYER_HTML"
          printf '%s\n' 'var res=lines[i].match(/RESOLUTION=\d+x(\d+)/)[1];' >> "$PLAYER_HTML"
          printf '%s\n' 'var url=lines[i+1].trim();' >> "$PLAYER_HTML"
          printf '%s\n' 'if(!url.startsWith("http")) url=BASE_PATH+url;' >> "$PLAYER_HTML"
          printf '%s\n' 'qualities[res]=url;' >> "$PLAYER_HTML"
          printf '%s\n' '}' >> "$PLAYER_HTML"
          printf '%s\n' '}' >> "$PLAYER_HTML"
          printf '%s\n' 'var sel=document.getElementById("quality-selector");' >> "$PLAYER_HTML"
          printf '%s\n' 'for(var q in qualities){' >> "$PLAYER_HTML"
          printf '%s\n' 'var btn=document.createElement("button");' >> "$PLAYER_HTML"
          printf '%s\n' 'btn.textContent=q+"p";' >> "$PLAYER_HTML"
          printf '%s\n' 'btn.className="quality-btn";' >> "$PLAYER_HTML"
          printf '%s\n' 'btn.onclick=(function(u){return function(){player.src({src:u,type:"application/x-mpegURL"});player.play();};})(qualities[q]);' >> "$PLAYER_HTML"
          printf '%s\n' 'sel.appendChild(btn);' >> "$PLAYER_HTML"
          printf '%s\n' '}' >> "$PLAYER_HTML"
          printf '%s\n' 'var player=videojs("my-video",{html5:{hls:{enableLowInitialPlaylist:true}}});' >> "$PLAYER_HTML"
          printf '%s\n' 'if(sel.children.length) sel.children[0].click();' >> "$PLAYER_HTML"
          printf '%s\n' '});' >> "$PLAYER_HTML"
          printf '%s\n' '</script>' >> "$PLAYER_HTML"
          printf '%s\n' '</body>' >> "$PLAYER_HTML"
          printf '%s\n' '</html>' >> "$PLAYER_HTML"
          
          echo ""
          echo "══════════════════════════════════════════════════════"
          echo "✅ HLS conversion complete!"
          echo "📁 Output: ${VIDEO_DIR}/"
          echo "📹 Video ID: $VIDEO_ID"
          echo "📝 Title: ${VIDEO_TITLE:-Unknown}"
          echo "══════════════════════════════════════════════════════"
          
          rm -f tmp_*.mp4

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      - name: Generate Download Report
        run: |
          VIDEO_DIR=$(find videos -type d -mindepth 1 -maxdepth 1 | head -1)
          VIDEO_NAME=$(basename "$VIDEO_DIR")
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          
          PLAYER_URL="https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${VIDEO_DIR}/player.html"
          
          echo "## 🎬 Download Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Video ID:** ${VIDEO_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "**Watch Online:** [Click here to play](${PLAYER_URL})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Files structure:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find "$VIDEO_DIR" -type f -name "*.ts" -o -name "*.m3u8" -o -name "*.html" | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "🎉 Player URL: $PLAYER_URL"

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          BRANCH="${GITHUB_REF_NAME}"
          
          find videos -type f \( -name "*.ts" -o -name "*.m3u8" -o -name "*.html" -o -name "*.m4a" -o -name "*.txt" \) | while read file; do
            git add "$file"
            COUNT=$(git diff --cached --name-only | wc -l)
            if [ "$COUNT" -ge 50 ]; then
              git commit -m "[AVASAM] Add HLS segments batch [skip ci]" || true
              git pull --rebase origin "$BRANCH" || true
              git push origin HEAD:"$BRANCH" || true
            fi
          done
          
          git commit -m "[AVASAM] Complete HLS video [skip ci]" || true
          git pull --rebase origin "$BRANCH" || true
          git push origin HEAD:"$BRANCH"
          
          echo "✅ All HLS files pushed successfully!"
