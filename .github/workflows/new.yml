name: 01- 🎬 Youtube Downloader (HLS Stream)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      hls_mode:
        description: 'Upload as HLS stream? (yes/no)'
        required: false
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start WARP Container
        run: |
          echo "🚀 Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "⏳ Waiting for WARP to initialize..."
          sleep 30
          for i in {1..10}; do
            if curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active!"
              break
            fi
            sleep 10
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip curl jq bc
          pip3 install --upgrade yt-dlp

      - name: Download & Convert to HLS
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          HLS_MODE="${{ github.event.inputs.hls_mode }}"
          
          mkdir -p videos
          
          echo "🏷️  AVASAM YouTube Downloader (HLS Support)"
          echo "🌐 https://avasam.ir"
          
          # Download video using yt-dlp
          echo "📥 Downloading video..."
          yt-dlp \
            --proxy "socks5://127.0.0.1:1080" \
            --format "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            --merge-output-format mp4 \
            --output "video.mp4" \
            --no-playlist \
            --retries 10 \
            "$URL"
          
          if [ ! -f "video.mp4" ]; then
            echo "❌ Download failed!"
            exit 1
          fi
          
          VIDEO_SIZE=$(stat -c%s "video.mp4")
          VIDEO_SIZE_MB=$(echo "scale=2; $VIDEO_SIZE / 1024 / 1024" | bc)
          echo "✅ Downloaded: $VIDEO_SIZE_MB MB"
          
          if [ "$HLS_MODE" = "yes" ]; then
            echo "🎬 Converting to HLS format..."
            
            # Get video info
            DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 video.mp4)
            DURATION_SEC=$(printf "%.0f" "$DURATION")
            
            # Calculate segment duration (aim for ~10MB per segment)
            # Each TS segment should be under 100MB, aiming for ~10MB is safer
            TARGET_SEGMENT_SIZE_MB=10
            ESTIMATED_SEGMENTS=$(( (VIDEO_SIZE_MB / TARGET_SEGMENT_SIZE_MB) + 1 ))
            SEGMENT_DURATION=$(( DURATION_SEC / ESTIMATED_SEGMENTS ))
            
            # Ensure segment duration is between 4 and 15 seconds
            if [ "$SEGMENT_DURATION" -lt 4 ]; then
              SEGMENT_DURATION=4
            elif [ "$SEGMENT_DURATION" -gt 15 ]; then
              SEGMENT_DURATION=15
            fi
            
            echo "📊 Video duration: ${DURATION_SEC}s"
            echo "📦 Segment duration: ${SEGMENT_DURATION}s"
            
            # Create HLS structure with subdirectories (v0, v1, v2...)
            # Each subdirectory will contain a portion of segments for better organization
            SEGMENTS_PER_FOLDER=50
            
            # Create master playlist
            cat > videos/master.m3u8 << EOF
#EXTM3U
#EXT-X-VERSION:3
#EXT-X-STREAM-INF:BANDWIDTH=2000000,RESOLUTION=1920x1080
stream.m3u8
EOF
            
            # Convert to HLS segments (store in temp)
            ffmpeg -i video.mp4 \
              -c:v libx264 -preset fast -crf 23 \
              -c:a aac -b:a 128k \
              -f hls \
              -hls_time $SEGMENT_DURATION \
              -hls_list_size 0 \
              -hls_segment_filename "videos/v%d/segment_%03d.ts" \
              -hls_base_url "./" \
              videos/stream.m3u8
            
            # Rename folders to v0, v1, v2...
            cd videos
            folder_counter=0
            for folder in v*; do
              if [ -d "$folder" ] && [[ "$folder" =~ ^v[0-9]+$ ]]; then
                mv "$folder" "temp_$folder"
              fi
            done
            
            # Reorganize
            ts_files=()
            for ts in v*/segment_*.ts; do
              if [ -f "$ts" ]; then
                ts_files+=("$ts")
              fi
            done
            
            # Sort and distribute
            mkdir -p v0 v1 v2 v3 v4 v5
            folder_idx=0
            for i in "${!ts_files[@]}"; do
              target_folder="v$((folder_idx))"
              mv "${ts_files[$i]}" "${target_folder}/segment_$(printf "%03d" $i).ts"
              if [ $(( (i + 1) % SEGMENTS_PER_FOLDER )) -eq 0 ]; then
                folder_idx=$((folder_idx + 1))
                mkdir -p "v$folder_idx"
              fi
            done
            
            # Update playlist with correct segment paths
            cat > stream.m3u8 << EOF
#EXTM3U
#EXT-X-VERSION:3
#EXT-X-TARGETDURATION:$SEGMENT_DURATION
#EXT-X-MEDIA-SEQUENCE:0
EOF
            
            # Add each segment to playlist
            for folder in v*/; do
              for segment in ${folder}segment_*.ts; do
                if [ -f "$segment" ]; then
                  DUR_CHECK=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$segment" 2>/dev/null || echo "$SEGMENT_DURATION")
                  printf "#EXTINF:%.3f,\n%s\n" "$DUR_CHECK" "$segment" >> stream.m3u8
                fi
              done
            done
            
            # Create HTML5 video player
            cat > player.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AVASAM HLS Video Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
