name: 01- 🎬 Youtube Downloader (Ultra Fast & Robust)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      use_cookies:
        description: 'Use cookies for private videos? (true/false)'
        required: false
        default: 'false'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup WARP (with fallback)
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          echo "⏳ Waiting for WARP..."
          WARP_READY=false
          for i in {1..12}; do
            sleep 5
            if docker ps | grep -q warp && curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP ready"
              WARP_READY=true
              break
            fi
          done
          if [ "$WARP_READY" = false ]; then
            echo "⚠️ WARP failed, will continue without proxy"
            echo "WARP_FAILED=true" >> $GITHUB_ENV
          else
            echo "WARP_FAILED=false" >> $GITHUB_ENV
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg curl
          pip3 install --upgrade yt-dlp

      - name: Check and prepare cookies
        id: cookies
        run: |
          if [ "${{ github.event.inputs.use_cookies }}" = "true" ]; then
            if [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
              echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
              echo "COOKIES_OPT=--cookies cookies.txt" >> $GITHUB_ENV
              echo "✅ Cookies loaded"
            else
              echo "⚠️ Cookies requested but YOUTUBE_COOKIES secret is empty"
              echo "COOKIES_OPT=" >> $GITHUB_ENV
            fi
          else
            echo "COOKIES_OPT=" >> $GITHUB_ENV
          fi

      - name: Ultra Fast Download & HLS Convert
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          mkdir -p videos

          if [ "$WARP_FAILED" = "true" ]; then
            PROXY_OPT=""
          else
            PROXY_OPT="--proxy socks5://127.0.0.1:1080"
          fi

          COOKIES_OPT="${COOKIES_OPT:-}"

          echo "ℹ️ Using proxy: ${PROXY_OPT:-none}"
          echo "ℹ️ Using cookies: ${COOKIES_OPT:-none}"

          VIDEO_ID=$(yt-dlp $PROXY_OPT $COOKIES_OPT --get-id --no-playlist "$URL" 2>/dev/null)
          VIDEO_TITLE=$(yt-dlp $PROXY_OPT $COOKIES_OPT --get-title --no-playlist "$URL" 2>/dev/null | sed 's/[^a-zA-Z0-9\-_ ]/ /g' | cut -c1-100)
          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Failed to get video ID"
            exit 1
          fi

          VIDEO_DIR="videos/${VIDEO_ID}"
          SEGMENTS_DIR="${VIDEO_DIR}/segments"
          mkdir -p "$SEGMENTS_DIR"

          {
            echo "Video ID: $VIDEO_ID"
            echo "Original Title: ${VIDEO_TITLE:-Unknown}"
            echo "YouTube URL: $URL"
            echo "Download Date: $(date)"
            echo "Quality Requested: $QUALITY"
          } > "${VIDEO_DIR}/video_info.txt"

          case "$QUALITY" in
            best)   QUALITIES=("1080" "720" "480") ;;
            1080)   QUALITIES=("1080") ;;
            720)    QUALITIES=("720") ;;
            480)    QUALITIES=("480") ;;
            audio)  QUALITIES=("audio") ;;
            *)      QUALITIES=("1080" "720" "480") ;;
          esac

          process_quality() {
            local Q="$1"
            if [ "$Q" == "audio" ]; then
              echo "🎵 Downloading audio..."
              yt-dlp $PROXY_OPT $COOKIES_OPT \
                --format "bestaudio" \
                --extract-audio --audio-format m4a \
                --output "${SEGMENTS_DIR}/audio.m4a" \
                --no-playlist --no-mtime \
                "$URL" && {
                  cat > "${VIDEO_DIR}/audio.m3u8" << AUDIO_M3U8
#EXTM3U
#EXT-X-VERSION:3
#EXT-X-ALLOW-CACHE:YES
#EXT-X-TARGETDURATION:10
#EXT-X-MEDIA-SEQUENCE:0
#EXTINF:10.0,
segments/audio.m4a
#EXT-X-ENDLIST
AUDIO_M3U8
                  echo "✅ Audio done"
                }
              return
            fi

            echo "🎬 Processing ${Q}p"
            local TEMP_MP4="tmp_${Q}.mp4"

            yt-dlp $PROXY_OPT $COOKIES_OPT \
              --format "best[height<=${Q}][ext=mp4]/best[height<=${Q}]" \
              --output "$TEMP_MP4" \
              --no-playlist --no-mtime --no-post-overwrites \
              --concurrent-fragments 10 --buffer-size 64K \
              --retries 5 --fragment-retries 5 \
              "$URL" 2>&1 | grep -v "Merger\|Deleting" || {
                yt-dlp $PROXY_OPT $COOKIES_OPT \
                  --format "bestvideo[height<=${Q}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${Q}][ext=mp4]" \
                  --merge-output-format mp4 \
                  --output "$TEMP_MP4" \
                  --no-playlist --no-mtime \
                  --concurrent-fragments 10 \
                  "$URL"
              }

            if [ ! -f "$TEMP_MP4" ]; then
              echo "⚠️ ${Q}p unavailable"
              return
            fi

            mkdir -p "${SEGMENTS_DIR}/${Q}p"

            ffmpeg -i "$TEMP_MP4" \
              -c:v libx264 -preset ultrafast -crf 28 -tune fastdecode \
              -c:a aac -b:a 128k -movflags +faststart \
              -f hls -hls_time 10 -hls_list_size 0 \
              -hls_segment_filename "${SEGMENTS_DIR}/${Q}p/segment_%03d.ts" \
              -hls_flags independent_segments \
              -threads auto \
              "${VIDEO_DIR}/${Q}p.m3u8" -loglevel error

            sed -i "s|^segment_|segments/${Q}p/segment_|g" "${VIDEO_DIR}/${Q}p.m3u8"

            rm -f "$TEMP_MP4"
            echo "✅ ${Q}p done"
          }

          for Q in "${QUALITIES[@]}"; do
            process_quality "$Q" &
            sleep 1
            while [ $(jobs -r | wc -l) -ge 3 ]; do sleep 1; done
          done
          wait

          MASTER="${VIDEO_DIR}/master.m3u8"
          cat > "$MASTER" << MASTER_M3U8
#EXTM3U
#EXT-X-VERSION:3
MASTER_M3U8
          for Q in "${QUALITIES[@]}"; do
            if [ "$Q" != "audio" ] && [ -f "${VIDEO_DIR}/${Q}p.m3u8" ]; then
              BANDWIDTH=$((Q * 1000))
              echo "#EXT-X-STREAM-INF:BANDWIDTH=${BANDWIDTH}000,RESOLUTION=1920x${Q}" >> "$MASTER"
              echo "${Q}p.m3u8" >> "$MASTER"
            fi
          done
          if [ -f "${VIDEO_DIR}/audio.m3u8" ]; then
            echo '#EXT-X-STREAM-INF:BANDWIDTH=128000,CODECS="mp4a.40.2"' >> "$MASTER"
            echo 'audio.m3u8' >> "$MASTER"
          fi

          PLAYER_FILE="${VIDEO_DIR}/player.html"
          cat > "$PLAYER_FILE" << 'PLAYER_HTML'
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes">
<title>AVASAM HLS Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:system-ui}
.container{display:flex;flex-direction:column;height:100vh}
video{flex:1;width:100%;object-fit:contain}
.controls{background:#1a1a1a;padding:12px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;border-top:1px solid #333}
button{background:#333;border:none;color:#fff;padding:8px 16px;border-radius:6px;cursor:pointer}
button.active{background:#007aff}
.status{position:fixed;bottom:10px;left:10px;background:rgba(0,0,0,0.7);color:#0f0;padding:4px 12px;border-radius:16px;font-size:12px;font-family:monospace;pointer-events:none}
</style>
</head>
<body>
<div class="container">
<video id="video" controls playsinline></video>
<div class="controls" id="quality-buttons"></div>
</div>
<div class="status" id="status">Loading...</div>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const VIDEO_ID = window.location.pathname.match(/\/videos\/([^\/]+)/)[1];
const BASE_URL = "https://raw.githubusercontent.com/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPOSITORY_NAME#*/}/${GITHUB_REF_NAME#refs/heads/}/videos/" + VIDEO_ID;
const video = document.getElementById("video");
const qualityDiv = document.getElementById("quality-buttons");
const statusDiv = document.getElementById("status");
let hls = null;

function log(msg, isError) {
  statusDiv.innerHTML = msg;
  statusDiv.style.color = isError ? "#ff6b6b" : "#8bc34a";
  console.log(msg);
}

async function fetchQualities() {
  const masterUrl = BASE_URL + "/master.m3u8";
  log("Fetching " + masterUrl);
  const res = await fetch(masterUrl);
  if (!res.ok) throw new Error("master.m3u8 HTTP " + res.status);
  const text = await res.text();
  const lines = text.split("\n");
  const qualities = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.includes("#EXT-X-STREAM-INF") && line.includes("RESOLUTION=")) {
      const match = line.match(/RESOLUTION=\d+x(\d+)/);
      if (match && i + 1 < lines.length) {
        const resolution = match[1];
        let playlist = lines[i + 1].trim();
        if (!playlist.startsWith("http")) playlist = BASE_URL + "/" + playlist;
        qualities.push({ label: resolution + "p", url: playlist, quality: resolution });
      }
    }
  }
  if (qualities.length === 0) throw new Error("No quality found");
  qualities.sort((a, b) => parseInt(b.label) - parseInt(a.label));
  return qualities;
}

async function fixM3u8Segments(playlistUrl, quality) {
  const res = await fetch(playlistUrl);
  if (!res.ok) throw new Error("playlist HTTP " + res.status);
  let content = await res.text();
  const lines = content.split("\n");
  const newLines = [];
  for (let line of lines) {
    line = line.trim();
    if (line && !line.startsWith("#") && line.endsWith(".ts")) {
      const corrected = BASE_URL + "/segments/" + quality + "p/" + line;
      newLines.push(corrected);
    } else {
      newLines.push(line);
    }
  }
  return newLines.join("\n");
}

async function playQuality(qualityUrl, label, qualityNum) {
  const currentTime = video.currentTime;
  const wasPlaying = !video.paused;
  log("Loading " + label + "...");
  let fixed;
  try {
    fixed = await fixM3u8Segments(qualityUrl, qualityNum);
  } catch (e) {
    log(e.message, true);
    return;
  }
  const blob = new Blob([fixed], { type: "application/vnd.apple.mpegurl" });
  const blobUrl = URL.createObjectURL(blob);
  if (hls) { hls.destroy(); hls = null; }
  if (Hls.isSupported()) {
    hls = new Hls({ capLevelToPlayerSize: true });
    hls.loadSource(blobUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      video.currentTime = currentTime;
      if (wasPlaying) video.play();
      log("Playing " + label);
    });
    hls.on(Hls.Events.ERROR, function(_, data) {
      log("HLS error: " + data.type, true);
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = blobUrl;
    video.addEventListener("loadedmetadata", function() {
      video.currentTime = currentTime;
      if (wasPlaying) video.play();
    });
    log("Playing " + label + " (native)");
  } else {
    log("HLS not supported", true);
  }
}

async function init() {
  try {
    const qualities = await fetchQualities();
    qualityDiv.innerHTML = "";
    qualities.forEach(function(q, idx) {
      const btn = document.createElement("button");
      btn.textContent = q.label;
      btn.onclick = function() {
        document.querySelectorAll("#quality-buttons button").forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        playQuality(q.url, q.label, q.quality);
      };
      qualityDiv.appendChild(btn);
      if (idx === 0) btn.click();
    });
  } catch (err) {
    log("Init error: " + err.message, true);
    qualityDiv.innerHTML = "<div style=\"color:#ff6b6b\">Error: " + err.message + "</div>";
  }
}

init();
</script>
</body>
</html>
PLAYER_HTML

          # Replace GitHub variables in player.html
          sed -i "s|\${GITHUB_REPOSITORY_OWNER}|${{ github.repository_owner }}|g" "$PLAYER_FILE"
          sed -i "s|\${GITHUB_REPOSITORY_NAME#*/}|${{ github.event.repository.name }}|g" "$PLAYER_FILE"
          sed -i "s|\${GITHUB_REF_NAME#refs/heads/}|${GITHUB_REF_NAME}|g" "$PLAYER_FILE"

          echo "✅ Done. Output: $VIDEO_DIR"
          echo "📁 Video ID: $VIDEO_ID"
          echo "🔗 Player URL: https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ github.event.repository.name }}/${GITHUB_REF_NAME}/${VIDEO_DIR}/player.html"

      - name: Stop WARP
        if: always()
        run: docker stop warp || true

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Ultra fast HLS video [skip ci]" || true
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push origin HEAD:"${{ github.ref_name }}"
