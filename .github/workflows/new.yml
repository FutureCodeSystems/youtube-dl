    $(basename "$URL")

2️⃣  Original YouTube Link
    ${URL}

3️⃣  Format
    🎬 HLS Streaming (segmented TS files)

4️⃣  Watch Online
    🌐 ${PLAYER_URL}

5️⃣  Structure
    videos/
    ├── master.m3u8 (Master playlist)
    ├── stream.m3u8 (Stream playlist)  
    ├── player.html (HTML5 player)
    ├── v0/segment_000.ts, segment_001.ts...
    ├── v1/segment_000.ts, segment_001.ts...
    └── ...

═══════════════════════════════════════════════════════════════════
                    🏷️ Generated by AVASAM
                      https://avasam.ir
═══════════════════════════════════════════════════════════════════
EOF
            
            echo "✅ HLS conversion complete!"
            echo "📁 Structure: videos/v0/, videos/v1/, ..."
            echo "🌐 Player URL: ${PLAYER_URL}"
            
          else
            # Original method (zip split)
            echo "📦 Using original split method..."
            SPLIT_MB=90
            # ... (your existing split code here)
          fi

      - name: Stop WARP Container
        if: always()
        run: docker stop warp || true; docker rm warp || true

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Add all files
          git add videos/
          
          # Commit
          git commit -m "[AVASAM] HLS stream upload [skip ci]" || echo "No changes to commit"
          
          # Push with retry
          for i in {1..3}; do
            git pull --rebase origin ${GITHUB_REF_NAME} && git push origin HEAD:${GITHUB_REF_NAME} && break
            sleep 5
          done
