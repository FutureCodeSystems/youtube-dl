name: 01- 🎬 Youtube Downloader (Ultra Fast)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup WARP (with fallback)
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp:latest
          echo "⏳ Waiting for WARP..."
          WARP_READY=false
          for i in {1..12}; do
            sleep 5
            if docker ps | grep -q warp && curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP ready"
              WARP_READY=true
              break
            fi
          done
          if [ "$WARP_READY" = false ]; then
            echo "⚠️ WARP failed"
            echo "WARP_FAILED=true" >> $GITHUB_ENV
          else
            echo "WARP_FAILED=false" >> $GITHUB_ENV
          fi

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg curl
          pip3 install --upgrade yt-dlp

      - name: Ultra Fast Download & HLS Convert
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          mkdir -p videos

          PROXY_OPT=""
          if [ "$WARP_FAILED" != "true" ]; then
            PROXY_OPT="--proxy socks5://127.0.0.1:1080"
          fi

          # Get both ID and title in a single yt-dlp call (tab-separated)
          INFO=$(yt-dlp $PROXY_OPT --print "%(id)s\t%(title)s" --no-playlist "$URL")
          VIDEO_ID=$(echo "$INFO" | head -1 | cut -f1)
          VIDEO_TITLE=$(echo "$INFO" | head -1 | cut -f2-)

          if [ -z "$VIDEO_ID" ]; then
            echo "❌ Failed to get video info"
            exit 1
          fi

          # Sanitize and safely truncate title (character-wise, UTF-8 safe)
          SAFE_TITLE=$(echo "$VIDEO_TITLE" | sed 's/[^a-zA-Z0-9\-_ ]/ /g' | head -c 100 | sed 's/ *$//')
          # Alternative: use bash substring (character-safe) but ensure length not exceed
          # SAFE_TITLE="${SAFE_TITLE:0:100}"   # already done via head -c 100

          VIDEO_DIR="videos/${VIDEO_ID}"
          SEGMENTS_DIR="${VIDEO_DIR}/segments"
          mkdir -p "$SEGMENTS_DIR"

          {
            echo "Video ID: $VIDEO_ID"
            echo "Original Title: ${VIDEO_TITLE:-Unknown}"
            echo "Safe Title: $SAFE_TITLE"
            echo "YouTube URL: $URL"
            echo "Download Date: $(date)"
            echo "Quality Requested: $QUALITY"
          } > "${VIDEO_DIR}/video_info.txt"

          # Determine qualities based on input
          case "$QUALITY" in
            best)   QUALITIES=("1080" "720" "480") ;;
            1080)   QUALITIES=("1080") ;;
            720)    QUALITIES=("720") ;;
            480)    QUALITIES=("480") ;;
            audio)  QUALITIES=("audio") ;;
            *)      QUALITIES=("1080" "720" "480") ;;
          esac

          # Map quality to resolution and bandwidth for master playlist
          declare -A RES_MAP BW_MAP
          RES_MAP=( ["1080"]="1920x1080" ["720"]="1280x720" ["480"]="854x480" )
          BW_MAP=( ["1080"]="5000000" ["720"]="2800000" ["480"]="1400000" )

          # Process each quality
          for Q in "${QUALITIES[@]}"; do
            if [ "$Q" == "audio" ]; then
              echo "🎵 Downloading & segmenting audio..."
              TEMP_AUDIO="tmp_audio.m4a"
              yt-dlp $PROXY_OPT \
                --format "bestaudio" \
                --extract-audio --audio-format m4a \
                --output "$TEMP_AUDIO" \
                --no-playlist --no-mtime \
                "$URL" || { echo "⚠️ Audio download failed"; continue; }

              mkdir -p "${SEGMENTS_DIR}/audio"
              ffmpeg -i "$TEMP_AUDIO" \
                -c:a aac -b:a 128k \
                -f hls -hls_time 10 -hls_list_size 0 \
                -hls_segment_filename "segments/audio/segment_%03d.ts" \
                -hls_flags independent_segments \
                "${VIDEO_DIR}/audio.m3u8" -loglevel error

              rm -f "$TEMP_AUDIO"
              echo "✅ Audio done"
              continue
            fi

            echo "🎬 Processing ${Q}p"
            TEMP_MP4="tmp_${Q}.mp4"

            # Try best single video+audio format, fallback to separate video and audio
            yt-dlp $PROXY_OPT \
              --format "best[height<=${Q}][ext=mp4]/best[height<=${Q}]" \
              --output "$TEMP_MP4" \
              --no-playlist --no-mtime --no-post-overwrites \
              --concurrent-fragments 10 --buffer-size 64K \
              "$URL" || {
                yt-dlp $PROXY_OPT \
                  --format "bestvideo[height<=${Q}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${Q}][ext=mp4]" \
                  --merge-output-format mp4 \
                  --output "$TEMP_MP4" \
                  --no-playlist --no-mtime \
                  "$URL"
              }

            if [ ! -f "$TEMP_MP4" ]; then
              echo "⚠️ ${Q}p download failed or unavailable"
              continue
            fi

            mkdir -p "${SEGMENTS_DIR}/${Q}p"

            ffmpeg -i "$TEMP_MP4" \
              -c:v libx264 -preset ultrafast -crf 28 -tune fastdecode \
              -c:a aac -b:a 128k \
              -f hls -hls_time 10 -hls_list_size 0 \
              -hls_segment_filename "segments/${Q}p/segment_%03d.ts" \
              -hls_flags independent_segments \
              -threads auto \
              "${VIDEO_DIR}/${Q}p.m3u8" -loglevel error

            rm -f "$TEMP_MP4"
            echo "✅ ${Q}p done"
          done

          # Create master.m3u8
          MASTER="${VIDEO_DIR}/master.m3u8"
          printf '#EXTM3U\n#EXT-X-VERSION:3\n' > "$MASTER"
          for Q in "${QUALITIES[@]}"; do
            if [ "$Q" == "audio" ]; then
              if [ -f "${VIDEO_DIR}/audio.m3u8" ]; then
                printf '#EXT-X-STREAM-INF:BANDWIDTH=128000,CODECS="mp4a.40.2"\n' >> "$MASTER"
                printf 'audio.m3u8\n' >> "$MASTER"
              fi
            elif [ -f "${VIDEO_DIR}/${Q}p.m3u8" ]; then
              BANDWIDTH="${BW_MAP[$Q]}"
              RES="${RES_MAP[$Q]}"
              printf '#EXT-X-STREAM-INF:BANDWIDTH=%s,RESOLUTION=%s\n' "$BANDWIDTH" "$RES" >> "$MASTER"
              printf '%sp.m3u8\n' "$Q" >> "$MASTER"
            fi
          done

          echo "✅ All done. Output: $VIDEO_DIR"

      - name: Stop WARP
        if: always()
        run: docker stop warp || true

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          # Only commit if there are changes
          if git diff --quiet --staged; then
            echo "No changes to commit"
          else
            git commit -m "Ultra fast HLS video [skip ci]"
          fi
          # Pull with rebase, abort on conflict (will fail the job)
          git pull --rebase origin "${{ github.ref_name }}" || { echo "❌ Rebase failed"; exit 1; }
          git push origin HEAD:"${{ github.ref_name }}"
