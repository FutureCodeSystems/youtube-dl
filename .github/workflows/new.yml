name: YouTube → HLS Pro

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube Video URL"
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------
      # Enable Docker (No apt install!)
      # ---------------------------
      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      # ---------------------------
      # Install Tools
      # ---------------------------
      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip curl
          pip3 install -U yt-dlp

      # ---------------------------
      # Start Cloudflare WARP
      # ---------------------------
      - name: Start WARP Proxy
        id: warp
        run: |
          docker run -d \
            --name warp \
            -p 1080:1080 \
            ghcr.io/virb3/wgcf-warp:latest

          echo "Waiting for WARP..."
          sleep 12

          if docker ps | grep warp; then
            echo "warp_status=running" >> $GITHUB_OUTPUT
          else
            echo "warp_status=failed" >> $GITHUB_OUTPUT
          fi

      # ---------------------------
      # Download Video (Retry + Fallback)
      # ---------------------------
      - name: Download Video via WARP
        id: download
        continue-on-error: true
        run: |
          mkdir input
          yt-dlp \
            --proxy socks5://127.0.0.1:1080 \
            -f "bv*+ba/best" \
            --retries 5 \
            --fragment-retries 5 \
            "${{ github.event.inputs.youtube_url }}" \
            -o "input/video.%(ext)s"

      - name: Fallback Download Without Proxy
        if: steps.download.outcome == 'failure'
        run: |
          echo "WARP failed, retrying without proxy..."
          yt-dlp \
            -f "bv*+ba/best" \
            --retries 5 \
            --fragment-retries 5 \
            "${{ github.event.inputs.youtube_url }}" \
            -o "input/video.%(ext)s"

      # ---------------------------
      # Convert to Multi-Quality HLS
      # ---------------------------
      - name: Generate Adaptive HLS
        run: |
          mkdir -p hls

          INPUT=$(ls input/video.*)

          ffmpeg -i "$INPUT" \
            -filter_complex \
            "[0:v]split=3[v1][v2][v3]; \
             [v1]scale=w=1920:h=1080[v1out]; \
             [v2]scale=w=1280:h=720[v2out]; \
             [v3]scale=w=854:h=480[v3out]" \
            -map "[v1out]" -map 0:a \
            -map "[v2out]" -map 0:a \
            -map "[v3out]" -map 0:a \
            -c:v libx264 -preset veryfast -crf 23 \
            -c:a aac -ar 48000 -b:a 128k \
            -f hls \
            -hls_time 6 \
            -hls_playlist_type vod \
            -hls_flags independent_segments \
            -hls_segment_filename "hls/v%v/segment_%03d.ts" \
            -master_pl_name master.m3u8 \
            -var_stream_map "v:0,a:0 v:1,a:1 v:2,a:2" \
            hls/v%v/playlist.m3u8

      # ---------------------------
      # Generate Player HTML
      # ---------------------------
      - name: Create HTML Player
        run: |
          cat <<EOF > hls/player.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>HLS Stream</title>
            <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
          </head>
          <body style="background:#111;text-align:center;color:white">
            <h2>Adaptive HLS Stream</h2>
            <video id="video" controls width="80%"></video>
            <script>
              const video = document.getElementById('video');
              const source = 'master.m3u8';
              if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(source);
                hls.attachMedia(video);
              } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = source;
              }
            </script>
          </body>
          </html>
          EOF

      # ---------------------------
      # Commit & Push
      # ---------------------------
      - name: Commit HLS Output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          mkdir -p videos
          cp -r hls/* videos/

          git add videos
          git commit -m "Add Adaptive HLS Stream" || echo "No changes"
          git push
