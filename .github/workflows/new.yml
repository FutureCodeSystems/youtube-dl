name: Youtube to HLS

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: "YouTube URL"
        required: true

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y ffmpeg python3-pip docker.io
          pip3 install -U yt-dlp

      # اجرای WARP مثل کد اصلی تو
      - name: Start WARP proxy
        run: |
          docker run -d \
          --name warp \
          -p 1080:1080 \
          ghcr.io/viRb3/wgcf-warp:latest

          sleep 10

      - name: Download video
        run: |
          mkdir input

          yt-dlp \
          --proxy socks5://127.0.0.1:1080 \
          -f "bestvideo+bestaudio/best" \
          "${{ github.event.inputs.youtube_url }}" \
          -o "input/video.%(ext)s"

      - name: Convert to HLS
        run: |
          mkdir -p hls

          ffmpeg -i input/video.* \
          -codec copy \
          -start_number 0 \
          -hls_time 6 \
          -hls_list_size 0 \
          -f hls \
          hls/playlist.m3u8

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          mkdir -p videos
          cp -r hls/* videos/

          git add videos
          git commit -m "Add HLS video"
          git push
