name: 01- 🎬 Youtube Downloader (Ultra Fast)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start WARP Container
        run: |
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting WARP..."
          sleep 30
          for i in {1..10}; do
            curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace | grep -q "warp=on" && break
            sleep 5
          done

      - name: Install Dependencies (with aria2 for speed)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg aria2 curl
          pip3 install --upgrade yt-dlp

      - name: Ultra Fast Download & HLS Convert
        run: |
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          mkdir -p videos

          # Get video ID and title
          VIDEO_ID=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --get-id --no-playlist "$URL")
          VIDEO_TITLE=$(yt-dlp --proxy "socks5://127.0.0.1:1080" --get-title --no-playlist "$URL" | sed 's/[^a-zA-Z0-9\-_ ]/ /g' | cut -c1-100)
          [[ -z "$VIDEO_ID" ]] && exit 1

          VIDEO_DIR="videos/${VIDEO_ID}"
          SEGMENTS_DIR="${VIDEO_DIR}/segments"
          mkdir -p "$SEGMENTS_DIR"

          # Save metadata
          {
            echo "Video ID: $VIDEO_ID"
            echo "Original Title: ${VIDEO_TITLE:-Unknown}"
            echo "YouTube URL: $URL"
            echo "Download Date: $(date)"
            echo "Quality Requested: $QUALITY"
          } > "${VIDEO_DIR}/video_info.txt"

          # Determine quality list
          case "$QUALITY" in
            best)   QUALITIES=("1080" "720" "480") ;;
            1080)   QUALITIES=("1080") ;;
            720)    QUALITIES=("720") ;;
            480)    QUALITIES=("480") ;;
            audio)  QUALITIES=("audio") ;;
          esac

          # Function to download & convert one quality (runs in background)
          process_quality() {
            local Q="$1"
            local TEMP_MP4="tmp_${Q}.mp4"

            if [ "$Q" == "audio" ]; then
              echo "🎵 Downloading audio (fast mode)..."
              yt-dlp --proxy "socks5://127.0.0.1:1080" \
                --format "bestaudio" \
                --extract-audio --audio-format m4a \
                --output "${SEGMENTS_DIR}/audio.m4a" \
                --no-playlist --no-mtime \
                --downloader aria2c --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
                "$URL" && {
                  printf '#EXTM3U\n#EXT-X-VERSION:3\n#EXT-X-ALLOW-CACHE:YES\n#EXT-X-TARGETDURATION:10\n#EXT-X-MEDIA-SEQUENCE:0\n#EXTINF:10.0,\nsegments/audio.m4a\n#EXT-X-ENDLIST\n' > "${VIDEO_DIR}/audio.m3u8"
                  echo "✅ Audio done"
                }
              return
            fi

            echo "🎬 Processing ${Q}p (parallel download + conversion)"
            # Try direct MP4 first (no merge, fastest)
            yt-dlp --proxy "socks5://127.0.0.1:1080" \
              --format "best[height<=${Q}][ext=mp4]/best[height<=${Q}]" \
              --output "$TEMP_MP4" \
              --no-playlist --no-mtime --no-post-overwrites \
              --concurrent-fragments 10 --buffer-size 64K \
              --downloader aria2c --downloader-args "aria2c:-x 16 -s 16 -k 1M" \
              "$URL" 2>&1 | grep -v "Merger\|Deleting" || {
                # Fallback to merge (rare)
                yt-dlp --proxy "socks5://127.0.0.1:1080" \
                  --format "bestvideo[height<=${Q}][ext=mp4]+bestaudio[ext=m4a]/best[height<=${Q}][ext=mp4]" \
                  --merge-output-format mp4 \
                  --output "$TEMP_MP4" \
                  --no-playlist --no-mtime \
                  --concurrent-fragments 10 \
                  "$URL"
              }

            if [ ! -f "$TEMP_MP4" ]; then
              echo "⚠️ ${Q}p unavailable"
              return
            fi

            mkdir -p "${SEGMENTS_DIR}/${Q}p"
            # Ultra fast HLS conversion: ultrafast preset, crf 28, threads auto, hls_time 10
            ffmpeg -i "$TEMP_MP4" \
              -c:v libx264 -preset ultrafast -crf 28 -tune fastdecode \
              -c:a aac -b:a 128k -movflags +faststart \
              -f hls -hls_time 10 -hls_list_size 0 \
              -hls_segment_filename "${SEGMENTS_DIR}/${Q}p/segment_%03d.ts" \
              -hls_flags independent_segments \
              -threads auto \
              "${VIDEO_DIR}/${Q}p.m3u8" -loglevel error

            sed -i "s|${Q}p/segment_|segments/${Q}p/segment_|g" "${VIDEO_DIR}/${Q}p.m3u8"
            rm -f "$TEMP_MP4"
            echo "✅ ${Q}p done (segments: $(ls ${SEGMENTS_DIR}/${Q}p/*.ts 2>/dev/null | wc -l))"
          }

          # Run all qualities in parallel (max 3 at a time)
          echo "Starting parallel downloads..."
          for Q in "${QUALITIES[@]}"; do
            process_quality "$Q" &
            # Limit parallel jobs to 3
            while [ $(jobs -r | wc -l) -ge 3 ]; do sleep 1; done
          done
          wait  # Wait for all background jobs to finish

          # Create master.m3u8
          MASTER="${VIDEO_DIR}/master.m3u8"
          printf '#EXTM3U\n#EXT-X-VERSION:3\n' > "$MASTER"
          for Q in "${QUALITIES[@]}"; do
            if [ "$Q" != "audio" ] && [ -f "${VIDEO_DIR}/${Q}p.m3u8" ]; then
              printf '#EXT-X-STREAM-INF:BANDWIDTH=%d000,RESOLUTION=1920x%s\n' "$((Q*1000))" "$Q" >> "$MASTER"
              printf '%sp.m3u8\n' "$Q" >> "$MASTER"
            fi
          done
          [ -f "${VIDEO_DIR}/audio.m3u8" ] && {
            printf '#EXT-X-STREAM-INF:BANDWIDTH=128000,CODECS="mp4a.40.2"\naudio.m3u8\n' >> "$MASTER"
          }

          # Generate ultra simple player HTML (no external deps, quality selector inside)
          PLAYER="${VIDEO_DIR}/player.html"
          cat > "$PLAYER" << 'EOF'
<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>AVASAM Player</title><link href="https://vjs.zencdn.net/8.10/video-js.min.css" rel="stylesheet"><style>body{background:#000;margin:0;padding:0}.video-js{width:100%;height:100vh}.vjs-menu-button-popup .vjs-menu{width:8em}</style></head><body><video id="player" class="video-js vjs-16-9 vjs-big-play-centered" controls preload="auto" playsinline></video><script src="https://vjs.zencdn.net/8.10/video.min.js"></script><script>
(function(){
const videoId=window.location.pathname.match(/\/videos\/([^\/]+)/)[1];
const base=`https://raw.githubusercontent.com/${GITHUB_REPOSITORY_OWNER}/${GITHUB_REPOSITORY_NAME#*/}/${GITHUB_REF_NAME#refs/heads/}/videos/${videoId}`;
let player;
fetch(base+'/master.m3u8').then(r=>r.text()).then(m3u8=>{
let qualities=[], lines=m3u8.split('\n');
for(let i=0;i<lines.length;i++){
if(lines[i].includes('RESOLUTION')){
let res=lines[i].match(/RESOLUTION=\d+x(\d+)/)[1];
let url=lines[i+1].trim(); if(!url.startsWith('http')) url=base+'/'+url;
qualities.push({label:res+'p',url});
}}
if(document.querySelector('#audioOnly')){}
player=videojs('player',{html5:{hls:{enableLowInitialPlaylist:true}}});
let best=qualities[0]; if(best) player.src({src:best.url,type:'application/x-mpegURL'});
let btn=player.controlBar.addChild('button'); btn.el().innerHTML='⚙️'; btn.on('click',()=>{
let menu=player.controlBar.el().querySelector('.vjs-menu'); if(menu)menu.remove();
let div=document.createElement('div'); div.className='vjs-menu'; let ul=document.createElement('ul'); ul.className='vjs-menu-content';
qualities.forEach(q=>{let li=document.createElement('li'); li.className='vjs-menu-item'; li.innerText=q.label; li.onclick=()=>{player.src({src:q.url,type:'application/x-mpegURL'}); player.play(); div.remove();}; ul.appendChild(li);});
div.appendChild(ul); player.controlBar.el().appendChild(div);});
}).catch(e=>console.error(e));
})();
</script></body></html>
EOF
          # Replace GitHub variables in player
          sed -i "s|\${GITHUB_REPOSITORY_OWNER}|${{ github.repository_owner }}|g" "$PLAYER"
          sed -i "s|\${GITHUB_REPOSITORY_NAME#*/}|${{ github.event.repository.name }}|g" "$PLAYER"
          sed -i "s|\${GITHUB_REF_NAME#refs/heads/}|${GITHUB_REF_NAME}|g" "$PLAYER"

          echo "✅ Done in parallel! Output: $VIDEO_DIR"

      - name: Stop WARP
        if: always()
        run: docker stop warp || true

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add videos/
          git commit -m "Ultra fast HLS video [skip ci]" || true
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push origin HEAD:"${{ github.ref_name }}"
