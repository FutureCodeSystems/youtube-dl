name: Clean everything except workflows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Show current structure (before cleanup)
      run: |
        echo "=== Current structure ==="
        ls -la
        echo ""
        echo "=== All directories ==="
        find . -maxdepth 1 -type d
      
    - name: Remove all files and directories except .github/workflows
      run: |
        # حذف همه فایل‌ها در ریشه
        find . -maxdepth 1 -type f -not -name ".gitkeep" -delete
        
        # حذف همه پوشه‌ها به جز .github و .git
        find . -maxdepth 1 -type d -not -name "." -not -name ".github" -not -name ".git" -exec rm -rf {} +
        
        # حالا داخل پوشه .github: همه چیز را حذف کن به جز workflows
        if [ -d ".github" ]; then
          find .github -maxdepth 1 -not -name ".github" -not -name "workflows" -exec rm -rf {} + 2>/dev/null || true
        fi
        
    - name: Verify result
      run: |
        echo "=== Result after cleanup ==="
        ls -la
        echo ""
        if [ -d ".github/workflows" ]; then
          echo "✅ SUCCESS: .github/workflows still exists"
          echo "Contents of workflows:"
          ls -la .github/workflows/
        else
          echo "❌ ERROR: .github/workflows was deleted!"
          exit 1
        fi
