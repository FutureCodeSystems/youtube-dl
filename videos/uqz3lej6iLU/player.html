<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>🎬 AVASAM Player</title>
<link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet">
<style>body{margin:0;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}.video-js{width:100%;height:auto;aspect-ratio:16/9}</style>
</head><body>
<video id="player" class="video-js vjs-big-play-centered" controls></video>
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
const videoId = window.location.pathname.match(/\/videos\/([^\/]+)/)[1];
const base = "https://raw.githubusercontent.com/FutureCodeSystems/youtube-dl/main/videos/" + videoId;
fetch(base+"/master.m3u8").then(r=>r.text()).then(data=>{
  const qualities={};
  const lines=data.split("\n");
  for(let i=0;i<lines.length;i++){
    if(lines[i].includes("RESOLUTION")){
      const match=lines[i].match(/RESOLUTION=\d+x(\d+)/);
      if(match){
        const url=lines[i+1].trim();
        qualities[match[1]]=url.startsWith("http")?url:base+"/"+url;
      }
    }
  }
  const best=Object.keys(qualities).sort((a,b)=>b-a)[0];
  videojs("player",{src:qualities[best],type:"application/x-mpegURL",html5:{hls:{enableLowInitialPlaylist:true}}});
});
</script>
</body></html>
