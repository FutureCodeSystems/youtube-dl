<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=yes"><title>AVASAM HLS Player</title>
<link href="https://vjs.zencdn.net/8.10/video-js.min.css" rel="stylesheet">
<style>body{background:#000;margin:0;padding:0}.video-js{width:100%;height:100vh}</style>
</head><body>
<video id="player" class="video-js vjs-16-9 vjs-big-play-centered" controls preload="auto" playsinline></video>
<script src="https://vjs.zencdn.net/8.10/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
(function(){
const BASE_URL = "https://raw.githubusercontent.com/FutureCodeSystems/youtube-dl/${GITHUB_REF_NAME}/videos/${VIDEO_ID}";
const video = document.getElementById("player");
let hls = null;
async function fetchQualities(){
const res=await fetch(BASE_URL+"/master.m3u8");
const txt=await res.text();
const lines=txt.split("\\n");
const qs=[];
for(let i=0;i<lines.length;i++){
const line=lines[i];
if(line.includes("#EXT-X-STREAM-INF")&&line.includes("RESOLUTION=")){
const m=line.match(/RESOLUTION=\\d+x(\\d+)/);
if(m&&i+1<lines.length){
let url=lines[i+1].trim();
if(!url.startsWith("http")) url=BASE_URL+"/"+url;
qs.push({label:m[1]+"p",url});
}}}
return qs;
}
async function playQuality(url){
const ct=video.currentTime, wasPlaying=!video.paused;
const res=await fetch(url);
let text=await res.text();
const lines=text.split("\\n");
const fixed=lines.map(l=>{
l=l.trim();
if(l&&!l.startsWith("#")&&l.endsWith(".ts"))return BASE_URL+"/"+l;
return l;
}).join("\\n");
const blob=new Blob([fixed],{type:"application/vnd.apple.mpegurl"});
const blobUrl=URL.createObjectURL(blob);
if(hls)hls.destroy();
if(Hls.isSupported()){
hls=new Hls();hls.loadSource(blobUrl);hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{video.currentTime=ct;if(wasPlaying)video.play();});
}else if(video.canPlayType("application/vnd.apple.mpegurl")){
video.src=blobUrl;video.addEventListener("loadedmetadata",()=>{video.currentTime=ct;if(wasPlaying)video.play();});
}}
async function init(){
const qualities=await fetchQualities();
if(qualities.length)playQuality(qualities[0].url);
}
init();
})();
</script>
</body></html>
