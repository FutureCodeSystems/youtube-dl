<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🎬 AVASAM HLS Player</title>
<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);margin:0;padding:20px;font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}
.container{max-width:1200px;width:100%;background:white;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.3);overflow:hidden;padding:20px}
.header{text-align:center;padding:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;margin:-20px -20px 20px -20px}
.header h1{margin:0;font-size:1.8em}
.header p{margin:10px 0 0;opacity:0.9}
.video-container{border-radius:10px;overflow:hidden;background:#000}
.quality-selector{margin-top:20px;text-align:center}
.quality-btn{background:#667eea;color:white;border:none;padding:10px 20px;margin:5px;border-radius:8px;cursor:pointer;transition:all 0.3s;font-size:14px}
.quality-btn:hover{background:#764ba2;transform:translateY(-2px)}
.quality-btn.active{background:#4CAF50;box-shadow:0 4px 15px rgba(76,175,80,0.3)}
.info{margin-top:20px;padding:15px;background:#f5f5f5;border-radius:10px;text-align:center;font-size:14px;color:#666}
.badge{display:inline-block;background:#4CAF50;color:white;padding:5px 10px;border-radius:20px;font-size:12px;margin:5px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎬 AVASAM HLS Player</h1>
<p>Stream directly from GitHub • No download needed</p>
</div>
<div class="video-container">
<video id="my-video" class="video-js vjs-big-play-centered vjs-16-9" controls preload="auto" width="100%" height="auto">
<p class="vjs-no-js">To view this video please enable JavaScript.</p>
</video>
</div>
<div class="quality-selector" id="quality-selector"></div>
<div class="info">
<span class="badge">⚡ HLS Streaming</span>
<span class="badge">🎥 Adaptive Bitrate</span>
<span class="badge">📱 Mobile Ready</span>
<p style="margin-top:10px">🌐 <strong>AVASAM</strong> - YouTube Downloader | <a href="https://avasam.ir" target="_blank">https://avasam.ir</a></p>
</div>
</div>
<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>
<script>
var BASE_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf("/") + 1);
var MASTER_URL = BASE_PATH + "master.m3u8";
var qualities={};
fetch(MASTER_URL).then(function(r){return r.text();}).then(function(data){
var lines=data.split("\n");
for(var i=0;i<lines.length;i++){
if(lines[i].includes("RESOLUTION")){
var res=lines[i].match(/RESOLUTION=\d+x(\d+)/)[1];
var url=lines[i+1].trim();
if(!url.startsWith("http")) url=BASE_PATH+url;
qualities[res]=url;
}
}
var sel=document.getElementById("quality-selector");
for(var q in qualities){
var btn=document.createElement("button");
btn.textContent=q+"p";
btn.className="quality-btn";
btn.onclick=(function(u){return function(){player.src({src:u,type:"application/x-mpegURL"});player.play();};})(qualities[q]);
sel.appendChild(btn);
}
var player=videojs("my-video",{html5:{hls:{enableLowInitialPlaylist:true}}});
if(sel.children.length) sel.children[0].click();
});
</script>
</body>
</html>
